<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContractIQ — BOLD / TDP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f3;--surface:#fff;--border:#e8e8e5;--text:#1a1a1a;--t2:#666;--t3:#999;--accent:#1a4fa0;--al:#e8eef8;--r:#c0392b;--rbg:#fdf0ef;--rb:#f5c0bb;--w:#b7770d;--wbg:#fef9ec;--wb:#f5d98a;--g:#2d7a3a;--gbg:#f0faf2;--gb:#a8dbb0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:14px}
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.lbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;width:320px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.lbox h1{font-size:20px;font-weight:700;margin-bottom:4px}
.lbox p{font-size:13px;color:var(--t2);margin-bottom:20px}
.linput{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:10px;outline:none;background:var(--bg)}
.linput:focus{border-color:var(--accent)}
.lbtn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.lbtn:hover{background:#163f85}
.lerr{font-size:12px;color:var(--r);margin-top:8px;display:none}
#app{display:none;flex:1;flex-direction:column;overflow:hidden}
#app.on{display:flex}
.bar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.bar-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.bar-tag{font-size:10px;font-weight:700;background:var(--al);color:var(--accent);padding:2px 8px;border-radius:4px;letter-spacing:.06em}
.bar-r{display:flex;align-items:center;gap:12px}
.bar-r span{font-size:12px;color:var(--t2)}
.bar-r button{font-size:12px;color:var(--t2);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px}
.bar-r button:hover{background:var(--bg)}
.body{display:flex;flex:1;overflow:hidden}
.left{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px;gap:14px}
.lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.drop{border:1.5px dashed #ccc;border-radius:10px;padding:20px 12px;text-align:center;cursor:pointer;position:relative;transition:all .15s}
.drop:hover,.drop.over{background:var(--al);border-color:var(--accent)}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-icon{font-size:24px;margin-bottom:6px}
.drop-t{font-size:12px;color:var(--t2);line-height:1.4}
.drop-ok{font-size:12px;color:var(--accent);font-weight:600;line-height:1.4}
.go{padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;transition:background .12s}
.go:hover:not(:disabled){background:#163f85}
.go:disabled{background:#ccc;cursor:not-allowed}
.main{flex:1;display:flex;overflow:hidden}
.center{flex:1;overflow-y:auto;padding:24px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--t2)}
.empty-state .icon{font-size:48px;opacity:.15}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
.loading p{font-size:14px;color:var(--t2)}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin:0 3px;animation:bop .9s infinite}
.dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.score-banner{border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px}
.score-banner.r{background:var(--rbg);border:1px solid var(--rb)}.score-banner.w{background:var(--wbg);border:1px solid var(--wb)}.score-banner.g{background:var(--gbg);border:1px solid var(--gb)}
.sb-icon{font-size:22px;flex-shrink:0}
.sb-title{font-size:14px;font-weight:700;margin-bottom:3px}
.score-banner.r .sb-title{color:var(--r)}.score-banner.w .sb-title{color:var(--w)}.score-banner.g .sb-title{color:var(--g)}
.sb-text{font-size:13px;color:var(--t2);line-height:1.5}
.section-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;margin-top:4px}
.clause-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.clause-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .1s}
.clause-head:hover{background:#fafaf8}
.ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ch-dot.r{background:var(--r)}.ch-dot.w{background:var(--w)}.ch-dot.g{background:var(--g)}
.ch-title{font-size:13px;font-weight:600;flex:1}
.ch-art{font-size:11px;color:var(--t3);flex-shrink:0;font-family:monospace;background:var(--bg);padding:2px 6px;border-radius:4px}
.ch-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;flex-shrink:0}
.ch-badge.r{background:var(--rbg);color:var(--r)}.ch-badge.w{background:var(--wbg);color:var(--w)}.ch-badge.g{background:var(--gbg);color:var(--g)}
.ch-arrow{font-size:10px;color:var(--t3);flex-shrink:0;transition:transform .2s}
.ch-arrow.open{transform:rotate(180deg)}
.clause-sales{padding:10px 14px 12px;background:#fafaf8;border-top:1px solid var(--border);font-size:13px;color:var(--t2);line-height:1.5}
.clause-detail{display:none;border-top:1px solid var(--border)}.clause-detail.open{display:block}
.cd-section{padding:12px 14px;border-bottom:1px solid var(--border)}.cd-section:last-child{border-bottom:none}
.cd-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.cd-text{font-size:13px;color:var(--text);line-height:1.6}
.cd-text.muted{color:var(--t2)}.cd-text.green{color:#1a5c28;background:var(--gbg);padding:8px 10px;border-radius:6px}
.cd-text.absent{color:var(--r);background:var(--rbg);padding:8px 10px;border-radius:6px;font-style:italic}
.list-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px}
.list-card ul{list-style:none;margin-top:8px}
.list-card li{font-size:13px;color:var(--t2);padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.list-card li:last-child{border-bottom:none}
.list-card li::before{content:"→";color:var(--t3);flex-shrink:0;font-size:12px;margin-top:1px}
.right-panel{width:240px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.rp-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.rp-row{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.rp-lbl{font-size:10px;color:var(--t3)}.rp-val{font-size:13px;font-weight:600;color:var(--text)}
.rp-divider{height:1px;background:var(--border);margin:0 -16px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat{text-align:center;padding:8px 4px;border-radius:7px}
.stat.r{background:var(--rbg)}.stat.w{background:var(--wbg)}.stat.g{background:var(--gbg)}
.stat-n{font-size:20px;font-weight:700}
.stat.r .stat-n{color:var(--r)}.stat.w .stat-n{color:var(--w)}.stat.g .stat-n{color:var(--g)}
.stat-l{font-size:10px;color:var(--t2);margin-top:1px}
.export-btn{width:100%;padding:8px;background:var(--bg);color:var(--t2);border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.export-btn:hover{background:var(--border)}
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <h1>ContractIQ</h1>
    <p>BOLD / TDP — Analyse de contrats</p>
    <input class="linput" type="password" id="pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')login()"/>
    <button class="lbtn" onclick="login()">Accéder</button>
    <div class="lerr" id="lerr">Mot de passe incorrect</div>
  </div>
</div>

<div id="app">
  <div class="bar">
    <div class="bar-logo">ContractIQ <span class="bar-tag">BOLD / TDP</span></div>
    <div class="bar-r"><span id="ulbl"></span><button onclick="doLogout()">Déconnexion</button></div>
  </div>
  <div class="body">
    <div class="left">
      <div class="lbl">Contrat</div>
      <div class="drop" id="drop">
        <input type="file" accept=".pdf,.docx,.doc,.txt" onchange="handleFile(event)"/>
        <div class="drop-icon">📄</div>
        <div id="dtext" class="drop-t">Déposer ici<br><small style="color:#bbb">PDF · DOCX</small></div>
      </div>
      <button class="go" id="go" disabled onclick="analyze()">Analyser →</button>
    </div>
    <div class="main">
      <div class="center" id="center">
        <div class="empty-state"><div class="icon">⚖️</div><p>Déposez un contrat pour commencer</p></div>
      </div>
      <div class="right-panel" id="rpanel" style="display:none"></div>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const USERS={'boldtdp2024':'Équipe BOLD','sales2024':'Sales','legal2024':'Legal'};

// ← URL de votre Cloudflare Worker — à mettre à jour après déploiement
const WORKER_URL = 'https://contractiq.VOTRE_SOUS_DOMAINE.workers.dev';

let contractText=null, analysisData=null;

function login(){
  const p=document.getElementById('pwd').value;
  if(USERS[p]){sessionStorage.setItem('ciq',p);document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');document.getElementById('ulbl').textContent=USERS[p];}
  else{document.getElementById('lerr').style.display='block';document.getElementById('pwd').value='';}
}
function doLogout(){sessionStorage.removeItem('ciq');location.reload()}
(()=>{const s=sessionStorage.getItem('ciq');if(s&&USERS[s]){document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');document.getElementById('ulbl').textContent=USERS[s]}})();

const drop=document.getElementById('drop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over')});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',async e=>{e.preventDefault();drop.classList.remove('over');await load(e.dataTransfer.files[0])});
async function handleFile(e){await load(e.target.files[0])}
async function load(file){
  if(!file)return;
  document.getElementById('dtext').innerHTML='<span style="color:var(--t2)">Lecture…</span>';
  try{
    if(file.name.endsWith('.pdf')) contractText=await readPDF(file);
    else if(file.name.match(/\.docx?$/i)) contractText=await readDOCX(file);
    else contractText=await file.text();
    document.getElementById('dtext').innerHTML=`<span class="drop-ok">✓ ${file.name}</span>`;
    document.getElementById('go').disabled=false;
  }catch(e){document.getElementById('dtext').textContent='Erreur — réessayez'}
}
async function readPDF(file){
  const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let t='';for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);t+=(await p.getTextContent()).items.map(s=>s.str).join(' ')+'\n'}
  return t;
}
async function readDOCX(file){return(await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()})).value}

async function analyze(){
  if(!contractText)return;
  analysisData=null;
  document.getElementById('rpanel').style.display='none';
  document.getElementById('center').innerHTML=`<div class="loading"><div class="dots"><span></span><span></span><span></span></div><p>Analyse BOLD/TDP en cours…</p></div>`;

  try{
    const res=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contractText})
    });
    if(!res.ok) throw new Error('Erreur worker '+res.status);

    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let full='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      full+=dec.decode(value,{stream:true});
    }
    const s=full.indexOf('{'),e=full.lastIndexOf('}');
    if(s===-1||e===-1) throw new Error('Réponse invalide');
    analysisData=JSON.parse(full.slice(s,e+1));
    render();
  }catch(err){
    document.getElementById('center').innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p style="color:var(--r)">${err.message}</p></div>`;
  }
}

function render(){
  const d=analysisData;
  const rc=d.clauses.filter(c=>c.statut==='risque').length;
  const wc=d.clauses.filter(c=>c.statut==='attention').length;
  const gc=d.clauses.filter(c=>c.statut==='ok').length;
  const ac=d.score==='élevé'?'r':d.score==='modéré'?'w':'g';
  const icons={r:'⛔',w:'⚡',g:'✅'};
  const labels={r:'Risque élevé',w:'Risque modéré',g:'Risque faible'};

  document.getElementById('rpanel').style.display='flex';
  document.getElementById('rpanel').innerHTML=`
    <div>
      <div class="rp-title">Parties</div>
      <div class="rp-row"><div class="rp-lbl">Agence</div><div class="rp-val">${esc(d.parties?.agence||'—')}</div></div>
      <div class="rp-row"><div class="rp-lbl">Talent</div><div class="rp-val">${esc(d.parties?.talent||'—')}</div></div>
      <div class="rp-row"><div class="rp-lbl">Client</div><div class="rp-val">${esc(d.parties?.client||'—')}</div></div>
    </div>
    <div class="rp-divider"></div>
    <div>
      <div class="rp-title">Contrat</div>
      ${d.campagne?`<div class="rp-row"><div class="rp-lbl">Campagne</div><div class="rp-val">${esc(d.campagne)}</div></div>`:''}
      ${d.budget?`<div class="rp-row"><div class="rp-lbl">Budget</div><div class="rp-val">${esc(d.budget)}</div></div>`:''}
      ${d.duree?`<div class="rp-row"><div class="rp-lbl">Durée</div><div class="rp-val">${esc(d.duree)}</div></div>`:''}
      <div class="rp-row"><div class="rp-lbl">Objet</div><div class="rp-val" style="font-weight:400;font-size:12px;color:var(--t2);line-height:1.4">${esc(d.objet||'—')}</div></div>
    </div>
    <div class="rp-divider"></div>
    <div>
      <div class="rp-title">Résultat</div>
      <div class="stats-row">
        <div class="stat r"><div class="stat-n">${rc}</div><div class="stat-l">Risques</div></div>
        <div class="stat w"><div class="stat-n">${wc}</div><div class="stat-l">Attention</div></div>
        <div class="stat g"><div class="stat-n">${gc}</div><div class="stat-l">OK</div></div>
      </div>
    </div>
    <div class="rp-divider"></div>
    <button class="export-btn" onclick="exportMD()">⬇ Exporter</button>`;

  let html=`<div class="score-banner ${ac}"><div class="sb-icon">${icons[ac]}</div><div><div class="sb-title">${labels[ac]}</div><div class="sb-text">${esc(d.resume)}</div></div></div>`;
  html+=`<div class="section-title">Clauses analysées</div>`;
  d.clauses.forEach(c=>{
    const cc=c.statut==='risque'?'r':c.statut==='attention'?'w':'g';
    const bl=c.statut==='risque'?'Risque':c.statut==='attention'?'À revoir':'Conforme';
    const absent=!c.texte_original||c.texte_original==='null';
    html+=`<div class="clause-card">
      <div class="clause-head" onclick="toggle(${c.id})">
        <div class="ch-dot ${cc}"></div>
        <div class="ch-title">${esc(c.titre)}</div>
        <div class="ch-art">${esc(c.article)}</div>
        <div class="ch-badge ${cc}">${bl}</div>
        <div class="ch-arrow" id="arr-${c.id}">▼</div>
      </div>
      <div class="clause-sales">${esc(c.resume_sales)}</div>
      <div class="clause-detail" id="det-${c.id}">
        ${absent?`<div class="cd-section"><div class="cd-label">Statut</div><div class="cd-text absent">⚠ Clause absente — à ajouter</div></div>`
                :`<div class="cd-section"><div class="cd-label">Texte original</div><div class="cd-text muted">${esc(c.texte_original)}</div></div>`}
        <div class="cd-section"><div class="cd-label">Analyse juridique</div><div class="cd-text">${esc(c.detail_legal)}</div></div>
        ${c.correction&&c.correction!=='null'
          ?`<div class="cd-section"><div class="cd-label">Correction recommandée</div><div class="cd-text green">${esc(c.correction)}</div></div>`
          :c.statut==='ok'?`<div class="cd-section"><div class="cd-text" style="color:var(--g)">✅ Conforme BOLD/TDP</div></div>`:''
        }
      </div>
    </div>`;
  });
  if(d.absentes?.length) html+=`<div class="section-title" style="margin-top:16px">Clauses manquantes</div><div class="list-card"><ul>${d.absentes.map(a=>`<li>${esc(a)}</li>`).join('')}</ul></div>`;
  if(d.negocier?.length) html+=`<div class="section-title" style="margin-top:16px">Priorités de négociation</div><div class="list-card"><ul>${d.negocier.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;
  document.getElementById('center').innerHTML=html;
}

function toggle(id){
  const det=document.getElementById('det-'+id);
  const arr=document.getElementById('arr-'+id);
  arr.classList.toggle('open',det.classList.toggle('open'));
}

function exportMD(){
  if(!analysisData)return;
  const d=analysisData;
  let md=`# Analyse ContractIQ — BOLD/TDP\n\n## Parties\n- Agence : ${d.parties?.agence||'—'}\n- Talent : ${d.parties?.talent||'—'}\n- Client : ${d.parties?.client||'—'}\n`;
  if(d.campagne)md+=`- Campagne : ${d.campagne}\n`;
  if(d.budget)md+=`- Budget : ${d.budget}\n`;
  if(d.duree)md+=`- Durée : ${d.duree}\n`;
  md+=`\n## Résumé\n**Risque ${d.score}** — ${d.resume}\n\n## Clauses\n\n| Clause | Article | Statut | Résumé | Correction |\n|---|---|---|---|---|\n`;
  d.clauses.forEach(c=>{md+=`| ${c.titre} | ${c.article} | ${c.statut} | ${(c.resume_sales||'').replace(/\n/g,' ')} | ${(c.correction||'—').replace(/\n/g,' ')} |\n`});
  if(d.absentes?.length)md+=`\n## Clauses manquantes\n${d.absentes.map(a=>`- ${a}`).join('\n')}\n`;
  if(d.negocier?.length)md+=`\n## Priorités\n${d.negocier.map(n=>`- ${n}`).join('\n')}\n`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));a.download='analyse-contrat.md';a.click();
}

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
